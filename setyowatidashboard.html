<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SETYOWATI GROUP Dashboard</title>
    <link rel="website icon" href="SETYOWATI GROUP Logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Pastikan Font Awesome sudah di-load -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
     /* Gaya umum */
body {
    font-family: 'Poppins', sans-serif;
    background-color: #f4f4f4;
    color: #333;
    margin: 0;
}

/* Sidebar */
.sidebar {
    background: #9b5402;
    color: white;
    width: 250px;
    min-height: 100vh;
    padding: 20px;
    position: fixed;
    display: flex;
    flex-direction: column;
    box-shadow: 4px 0 10px rgba(0, 0, 0, 0.1);
}

.sidebar h3 {
    font-weight: bold;
    text-align: center;
    margin-bottom: 20px;
}

.sidebar .nav-link {
    color: white;
    padding: 10px;
    font-size: 16px;
    display: flex;
    align-items: center;
    transition: background 0.3s;
}

.sidebar .nav-link i {
    margin-right: 10px;
}

.sidebar .nav-link:hover {
    background: rgba(255, 255, 255, 0.2);
    border-radius: 5px;
}

.sidebar .nav-link.text-danger:hover {
    background: rgba(255, 0, 0, 0.2);
}

/* Konten */
.content {
    margin-left: 270px;
    padding: 20px;
}

h2 {
    font-weight: bold;
    color: #9b5402;
}

/* Kartu Informasi */
.card {
    background: white;
    border-radius: 10px;
    padding: 20px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    text-align: center;
}

.card h3 {
    font-size: 24px;
    font-weight: bold;
    margin-top: 10px;
    color: #333;
}

/* Tombol */
.btn-success, .btn-danger {
    font-weight: bold;
    padding: 10px 20px;
    border-radius: 5px;
    transition: 0.3s;
}

.btn-success:hover {
    background: #007d00;
}

.btn-danger:hover {
    background: #c00;
}


.alert-warning-coffee {
    color: #91460a;
    padding: 15px;
    font-size: 18px;
    font-weight: bold;
    text-align: center;
    border-radius: 8px;
    box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
    margin: 20px 0;
    position: relative;
    animation: fadeIn 0.8s ease-in-out;
}

.warning-icon {
    margin-right: 8px;
    font-size: 22px;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(-10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}


    </style>
</head>
<body>
    <div class="sidebar">
        <h3>SETYOWATI GROUP</h3>
        <ul class="nav flex-column p-3">
            <!-- Dashboard -->
            <li class="nav-item">
                <a class="nav-link text-white" href="#dashboard">
                    <i class="fa-solid fa-house"></i> Dashboard
                </a>
            </li>
        
            <!-- Data Report -->
            <li class="nav-item">
                <a class="nav-link text-white" href="setyowatidatareport.html">
                    <i class="fa-solid fa-chart-bar"></i> Data Report
                </a>
            </li>


        <!-- Add Data -->
<li class="nav-item">
    <a href="setyowatigroupform.html" class="nav-link text-white">
        <i class="fa-solid fa-plus"></i> Tambah Data
    </a>
</li>

<!-- Delete Data -->
<li class="nav-item">
    <button class="nav-link text-white ms-2 bg-transparent border-0" onclick="hapusData()">
        <i class="fa-solid fa-trash"></i> Hapus Data
    </button>
</li>
    


            <!-- Exit -->
            <li class="nav-item mt-auto">
                <a class="nav-link text-danger fw-bold" href="index.html">
                    <i class="fa-solid fa-right-from-bracket"></i> Exit
                </a>
            </li>
        </ul>
        
    </div>
    <div class="content" id="dashboard">
        <div class="d-flex justify-content-between align-items-center">
            <h2>Dashboard</h2>
        </div>
        <div class="row">
            <div class="col-md-4">
                <div class="card p-3">
                    <h5>Total Kaus Terjual</h5>
                    <h3 id="displayTotalKaus">0</h3>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3">
                    <h5>Total Jersey Terjual</h5>
                    <h3 id="displayTotalJersey">0</h3>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3">
                    <h5>Total /Jaket Terjual</h5>
                    <h3 id="displayTotalJaket">0</h3>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3">
                    <h5>Jumlah Uang Dihasilkan</h5>
                    <h3 id="displayTotalUang">Rp 0</h3>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3">
                    <h5>Periode</h5>
                    <h3 id="displayPeriode">-</h3>
                    <small id="displayTanggal"></small> <!-- Menampilkan tanggal -->
                </div>
            </div>
        </div>
        <div class="alert-warning-coffee">
            <span class="warning-icon">⚠️</span> 
            Hanya pihak <strong>SETYOWATI GROUP</strong> yang boleh membuka data pada dashboard!
        </div>
        <div class="row mt-4">
            <div class="col-md-6">
                <canvas id="kausChart"></canvas>
            </div>
            <div class="row mt-4">
                <div class="col-md-6">
                    <canvas id="jerseyChart"></canvas>
                </div>
                <div class="row mt-4">
                    <div class="col-md-6">
                        <canvas id="jaketChart"></canvas>
                    </div>
            <div class="col-md-6">
                <canvas id="uangChart"></canvas>
            </div>
        </div>
    </div>


    <script>
        var tempCtx = document.getElementById('temperatureChart').getContext('2d');
        new Chart(tempCtx, {
            type: 'line',
            data: { labels: ['23:50', '23:55', '00:05', '00:10'], datasets: [{ label: 'Temperature', data: [26, 28, 26, 25], borderColor: 'red', fill: false }] }
        });
        var humCtx = document.getElementById('humidityChart').getContext('2d');
        new Chart(humCtx, {
            type: 'line',
            data: { labels: ['23:50', '23:55', '00:05', '00:10'], datasets: [{ label: 'Humidity', data: [90, 92, 91, 93], borderColor: 'blue', fill: false }] }
        });
    </script>

<script>
    let salesData = JSON.parse(localStorage.getItem("salesData"));

    if (salesData) {
        document.getElementById("displayTotalKaus").innerText = salesData.totalKaus;
        document.getElementById("displayTotalJersey").innerText = salesData.totalJersey;
        document.getElementById("displayTotalJaket").innerText = salesData.totalJaket;
        document.getElementById("displayTotalUang").innerText = "Rp " + salesData.totalUang;
        document.getElementById("displayPeriode").innerText = salesData.periode;

        // Tambahkan tanggal jika ada
        if (salesData.tanggal) {
            document.getElementById("displayTanggal").innerText = "Tanggal: " + salesData.tanggal;
        }

        let ctx1 = document.getElementById('kausChart').getContext('2d');
        let ctx3 = document.getElementById('jerseyChart').getContext('2d');
        let ctx4 = document.getElementById('jaketChart').getContext('2d');
        let ctx2 = document.getElementById('uangChart').getContext('2d');

        new Chart(ctx1, {
            type: 'bar',
            data: {
                labels: ["Total Kaus"],
                datasets: [{
                    label: 'Total Kaus Terjual',
                    data: [salesData.totalKaus],
                    backgroundColor: 'rgba(75, 192, 192, 0.6)',
                    borderColor: 'rgba(75, 192, 192, 1)',
                    borderWidth: 1
                }]
            }
        });

        new Chart(ctx3, {
            type: 'bar',
            data: {
                labels: ["Total Jersey"],
                datasets: [{
                    label: 'Total Jersey Terjual',
                    data: [salesData.totalJersey],
                    backgroundColor: 'rgba(75, 192, 192, 0.6)',
                    borderColor: 'rgba(75, 192, 192, 1)',
                    borderWidth: 1
                }]
            }
        });

        new Chart(ctx4, {
            type: 'bar',
            data: {
                labels: ["Total Jaket"],
                datasets: [{
                    label: 'Total Jaket Terjual',
                    data: [salesData.totalJaket],
                    backgroundColor: 'rgba(75, 192, 192, 0.6)',
                    borderColor: 'rgba(75, 192, 192, 1)',
                    borderWidth: 1
                }]
            }
        });

        new Chart(ctx2, {
            type: 'bar',
            data: {
                labels: ["Jumlah Uang"],
                datasets: [{
                    label: 'Total Uang Dihasilkan',
                    data: [salesData.totalUang],
                    backgroundColor: 'rgba(255, 99, 132, 0.6)',
                    borderColor: 'rgba(255, 99, 132, 1)',
                    borderWidth: 1
                }]
            }
        });
    }

    // Fungsi untuk menghapus data
    function hapusData() {
            let konfirmasi = confirm("Apakah Anda yakin ingin menghapus semua data?");
            if (konfirmasi) {
                localStorage.removeItem("salesData");
                alert("Data berhasil dihapus!");
                location.reload(); // Refresh halaman agar tampilan kembali kosong
            }
        }
</script>


</body>
</html>
